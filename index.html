<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme 6 — Exam Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root{
    --bg:#f4efe3;
    --panel:#fbf8f1;
    --panel-2:#f2ebdd;
    --gold:#9a7836;
    --gold-soft:#b08d4e;
    --ink:#2b2620;
    --ink-dim:#6d6555;
    --line:#e3d9c6;
    --correct:#5d7a46;
    --correct-bg:#e9efdd;
    --wrong:#9c4d40;
    --wrong-bg:#f6e6e1;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'DM Sans',sans-serif;
    font-weight:300;
    line-height:1.55;
    padding:0 0 80px;
  }

  header{
    text-align:center;
    padding:54px 20px 34px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#faf6ec,#f4efe3);
  }
  header .eyebrow{
    font-family:'DM Sans',sans-serif;
    letter-spacing:.42em;
    text-transform:uppercase;
    font-size:.66rem;
    color:var(--gold-soft);
    margin-bottom:14px;
  }
  header h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:2.9rem;
    margin:0 0 6px;
    color:var(--ink);
    letter-spacing:.01em;
  }
  header .sub{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:1.25rem;
    color:var(--ink-dim);
  }

  .wrap{max-width:840px;margin:0 auto;padding:0 22px;}

  /* score bar */
  .scorebar{
    position:sticky;top:0;z-index:20;
    background:rgba(244,239,227,.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 22px;
    margin-bottom:26px;
  }
  .scorebar .label{
    letter-spacing:.28em;text-transform:uppercase;
    font-size:.62rem;color:var(--gold-soft);
  }
  .scorebar .val{
    font-family:'Cormorant Garamond',serif;
    font-size:1.5rem;color:var(--gold);
  }
  .scorebar .right{display:flex;gap:18px;align-items:center;}
  .reset{
    background:transparent;border:1px solid var(--line);
    color:var(--ink-dim);font-family:'DM Sans';font-size:.7rem;
    letter-spacing:.14em;text-transform:uppercase;
    padding:7px 14px;border-radius:2px;cursor:pointer;transition:.2s;
  }
  .reset:hover{border-color:var(--gold-soft);color:var(--gold);}

  /* section heading */
  .section-head{
    margin:46px 0 18px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .section-head .num{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;color:var(--gold-soft);font-size:1rem;
  }
  .section-head h2{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;font-size:1.7rem;margin:2px 0 0;color:var(--gold);
  }

  .q{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:22px 24px 20px;
    margin-bottom:16px;
  }
  .q .qmeta{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:10px;
  }
  .q .qnum{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--gold-soft);font-size:1.05rem;
  }
  .q .pts{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);}
  .q .stem{
    font-size:1.04rem;color:var(--ink);margin-bottom:16px;font-weight:400;
  }
  .opt{
    display:block;width:100%;text-align:left;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'DM Sans';font-size:.95rem;font-weight:300;
    padding:12px 15px;margin-bottom:9px;border-radius:3px;
    cursor:pointer;transition:.18s;display:flex;gap:11px;align-items:flex-start;
  }
  .opt .letter{
    color:var(--gold-soft);font-family:'Cormorant Garamond',serif;
    font-size:1.05rem;flex-shrink:0;min-width:14px;
  }
  .opt:hover:not(:disabled){border-color:var(--gold-soft);background:#efe7d6;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg);}
  .opt.correct .letter{color:var(--correct);}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .opt.wrong .letter{color:var(--wrong);}
  .opt.dim{opacity:.45;}

  .explain{
    margin-top:6px;
    border-left:2px solid var(--gold-soft);
    padding:11px 16px;
    background:#f7f2e7;
    font-size:.9rem;color:var(--ink-dim);
    border-radius:0 3px 3px 0;
    display:none;
  }
  .explain.show{display:block;}
  .explain b{color:var(--gold);font-weight:500;}
  .explain .tag{
    display:inline-block;font-size:.58rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--correct);
    margin-bottom:5px;
  }
  .explain .tag.miss{color:var(--wrong);}

  footer{
    text-align:center;color:var(--ink-dim);font-size:.75rem;
    margin-top:60px;font-family:'Cormorant Garamond';font-style:italic;
  }
</style>

    let optsHtml='';
    q.o.forEach((opt,i)=>{
      optsHtml += `<button class="opt" data-i="${i}" onclick="pick(this, ${n}, ${i}, ${q.a})">
        <span class="letter">${LET[i]}</span><span>${opt}</span></button>`;
    });

    card.innerHTML = `
      <div class="qmeta"><span class="qnum">Question ${n}</span><span class="pts">1 point</span></div>
      <div class="stem">${q.s}</div>
      ${optsHtml}
      <div class="explain" id="exp-${n}"></div>`;
    quiz.appendChild(card);
    // stash explanation + correct index for reveal
    card.dataset.exp = encodeURIComponent(q.e);
    card.dataset.correct = q.a;
    card.dataset.correctText = encodeURIComponent(q.o[q.a]);
  });
});

function pick(btn, n, chosen, correct){
  const card = btn.closest('.q');
  if(card.dataset.answered==='1') return;
  card.dataset.answered='1';

  const opts = card.querySelectorAll('.opt');
  opts.forEach(o=>{
    o.disabled=true;
    const idx=parseInt(o.dataset.i);
    if(idx===correct){o.classList.add('correct');}
    else if(idx===chosen){o.classList.add('wrong');}
    else{o.classList.add('dim');}
  });

  const exp = document.getElementById('exp-'+n);
  const right = (chosen===correct);
  const tag = right
    ? `<span class="tag">Correct</span>`
    : `<span class="tag miss">Correct answer: ${decodeURIComponent(card.dataset.correctText)}</span>`;
  exp.innerHTML = tag + '<br>' + decodeURIComponent(card.dataset.exp);
  exp.classList.add('show');

  answered++;
  if(right) score++;
  updateBar();
}

function updateBar(){
  document.getElementById('score').textContent=score;
  document.getElementById('answered').textContent=answered;
}

function resetAll(){
  answered=0; score=0; updateBar();
  document.querySelectorAll('.q').forEach(card=>{
    card.dataset.answered='0';
    card.querySelectorAll('.opt').forEach(o=>{
      o.disabled=false;
      o.classList.remove('correct','wrong','dim');
    });
    const exp=card.querySelector('.explain');
    exp.classList.remove('show'); exp.innerHTML='';
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
